<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>피아노 음이름 게임</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin-top: 30px;
}

/* 페이지 */
.page { display: none; }
.active { display: block; }

/* 버튼 */
.level-btn {
  padding: 15px 25px;
  margin: 10px;
  font-size: 18px;
}

/* 카드 */
.notes { margin-bottom: 40px; }

.note {
  display: inline-block;
  padding: 10px 15px;
  margin: 5px;
  background: #f0f0f0;
  border: 1px solid #ccc;
}

.note.selected { background: #ffd966; }

/* 건반 */
.keyboard {
  position: relative;
  width: 420px;
  height: 200px;
  margin: 0 auto;
  display: flex;
}

.white-key {
  width: 60px;
  height: 200px;
  border: 1px solid black;
  background: white;
}

.black-key {
  width: 40px;
  height: 120px;
  background: black;
  position: absolute;
  top: 0;
  z-index: 3;
}

.black-key.csharp { left: 40px; }
.black-key.dsharp { left: 100px; }
.black-key.fsharp { left: 220px; }
.black-key.gsharp { left: 280px; }
.black-key.asharp { left: 340px; }

.correct { background: lightgreen !important; }
.wrong { background: #ffcccc !important; }
</style>
</head>

<body>

<!-- 시작 화면 -->
<div id="startPage" class="page active">
  <h2>🎵 단계 선택</h2>
  <button class="level-btn" onclick="startGame(1)">1단계 (C~E)</button>
  <button class="level-btn" onclick="startGame(2)">2단계 (C~G)</button>
  <button class="level-btn" onclick="startGame(3)">3단계 (C~B)</button>
</div>

<!-- 게임 화면 -->
<div id="gamePage" class="page">
  <h2>🎵 피아노 음이름 게임</h2>
  <div id="timer">⏱ 0.00초</div>

  <div class="notes" id="notes"></div>

  <div class="keyboard">
    <div class="white-key" data-note="C"></div>
    <div class="white-key" data-note="D"></div>
    <div class="white-key" data-note="E"></div>
    <div class="white-key" data-note="F"></div>
    <div class="white-key" data-note="G"></div>
    <div class="white-key" data-note="A"></div>
    <div class="white-key" data-note="B"></div>

    <div class="black-key csharp"></div>
    <div class="black-key dsharp"></div>
    <div class="black-key fsharp"></div>
    <div class="black-key gsharp"></div>
    <div class="black-key asharp"></div>
  </div>

  <br><br>
  <button onclick="goHome()">← 돌아가기</button>
</div>

<script>
let selected = null;

/* ⏱ 타이머 */
let startTime = null;
let timerInterval = null;

/* 🔊 소리 */
function playNoteSound(note) {
  const audio = new Audio(`sounds/${note.toLowerCase()}.m4a`);
  audio.currentTime = 0;
  audio.play();
}

function playCorrectSound() {
  const audio = new Audio(`sounds/right.m4a`);
  audio.currentTime = 0;
  audio.play();
}

function playSuccessSound() {
  const audio = new Audio(`sounds/success.mp3`);
  audio.currentTime = 0;
  audio.play();
}

/* ⏱ 타이머 시작 */
function startTimer() {
  startTime = Date.now();

  timerInterval = setInterval(() => {
    const elapsed = Date.now() - startTime;

    const seconds = Math.floor(elapsed / 1000);
    const cs = Math.floor((elapsed % 1000) / 10);

    document.getElementById("timer").innerText =
      `⏱ ${seconds}.${cs.toString().padStart(2, '0')}초`;
  }, 50);
}

/* 🎉 완료 체크 */
function checkGameComplete() {
  const remaining = document.querySelectorAll(".note").length;

  if (remaining === 0) {
    clearInterval(timerInterval);

    const elapsed = Date.now() - startTime;

    const seconds = Math.floor(elapsed / 1000);
    const cs = Math.floor((elapsed % 1000) / 10);

    const finalTime = `${seconds}.${cs.toString().padStart(2, '0')}`;

    playSuccessSound(); // 🎉 success.mp3

    setTimeout(() => {
      alert(`🎉 성공!\n플레이 시간: ${finalTime}초`);
    }, 300);
  }
}

/* 🎯 게임 시작 */
function startGame(level) {
  let notes;

  if (level === 1) notes = ["C","D","E"];
  if (level === 2) notes = ["C","D","E","F","G"];
  if (level === 3) notes = ["C","D","E","F","G","A","B"];

  notes.sort(() => Math.random() - 0.5);

  const container = document.getElementById("notes");
  container.innerHTML = "";

  selected = null;
  startTime = null;
  clearInterval(timerInterval);
  document.getElementById("timer").innerText = "⏱ 0.00초";

  notes.forEach(note => {
    const div = document.createElement("div");
    div.className = "note";
    div.innerText = note;

    div.addEventListener("click", () => {

      // ⏱ 첫 클릭 시 타이머 시작
      if (!startTime) startTimer();

      document.querySelectorAll(".note").forEach(n => n.classList.remove("selected"));

      div.classList.add("selected");
      selected = div;

      playNoteSound(note);
    });

    container.appendChild(div);
  });

  document.querySelectorAll(".white-key").forEach(key => {
    key.onclick = () => {
      if (!selected) return;

      if (selected.innerText === key.dataset.note) {
        key.classList.add("correct");

        playCorrectSound();

        selected.remove();
        selected = null;

        checkGameComplete();
      } else {
        key.classList.add("wrong");
        setTimeout(() => key.classList.remove("wrong"), 500);
      }
    };
  });

  document.getElementById("startPage").classList.remove("active");
  document.getElementById("gamePage").classList.add("active");
}

/* 🔙 돌아가기 */
function goHome() {
  document.getElementById("gamePage").classList.remove("active");
  document.getElementById("startPage").classList.add("active");

  clearInterval(timerInterval);

  document.querySelectorAll(".white-key").forEach(key => {
    key.classList.remove("correct");
  });
}
</script>

</body>
</html>
