<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>피아노 게임</title>

<style>
body { text-align:center; font-family:sans-serif; }

.page { display:none; }
.active { display:block; }

.best { color:red; font-weight:bold; }

/* 카드 */
.note {
  margin:5px;
  padding:10px 15px;
  background:#eee;
  border:1px solid #ccc;
  cursor:pointer;
}

/* ⭐ 선택된 카드 */
.note.selected {
  background:#ffd966;
}

/* 건반 */
.keyboard {
  position:relative;
  width:fit-content;
  margin:20px auto;
  height:200px;
}

.white-key {
  width:60px; height:200px;
  border:1px solid black;
  float:left;
}

.black-key {
  position:absolute;
  width:40px; height:120px;
  background:black;
  top:0;
}
</style>
</head>

<body>

<!-- 이름 -->
<div id="startPage" class="page active">
  <h2>이름 입력</h2>
  <input id="username">
  <br><br>
  <button onclick="goLevel()">시작</button>
</div>

<!-- 단계 -->
<div id="levelPage" class="page">
  <h2>단계 선택</h2>
  <button onclick="startGame(1)">1단계</button>
  <button onclick="startGame(2)">2단계</button>
  <button onclick="startGame(3)">3단계</button>
</div>

<!-- 게임 -->
<div id="gamePage" class="page">
  <h2 id="playerName"></h2>
  <div id="timer">⏱ 0.00초</div>

  <div id="notes"></div>
  <div id="keyboard" class="keyboard"></div>
</div>

<!-- 결과 -->
<div id="resultPage" class="page">
  <h2>결과</h2>
  <div id="records"></div>
  <button onclick="location.reload()">다시하기</button>
</div>

<script>
let name="";
let selected=null;
let startTime=null;
let startClock=null;
let timerInterval=null;

/* 🔊 사운드 */
function playSound(file){
  const audio=new Audio(file);
  audio.currentTime=0;
  audio.play().catch(()=>{});
}

/* 페이지 이동 */
function goLevel(){
  name=document.getElementById("username").value;
  if(!name) return alert("이름 입력");

  document.getElementById("startPage").classList.remove("active");
  document.getElementById("levelPage").classList.add("active");
}

/* ⏱ 타이머 */
function startTimer(){
  startTime=Date.now();
  startClock=new Date(); // ⭐ 시작 시각 저장

  timerInterval=setInterval(()=>{
    const t=Date.now()-startTime;
    const s=Math.floor(t/1000);
    const cs=Math.floor((t%1000)/10);

    document.getElementById("timer").innerText =
      `⏱ ${s}.${cs.toString().padStart(2,'0')}초`;
  },50);
}

/* 🎯 게임 시작 */
function startGame(level){

  document.getElementById("levelPage").classList.remove("active");
  document.getElementById("gamePage").classList.add("active");

  document.getElementById("playerName").innerText=name;

  let card, keys;

  if(level==1){
    card=["C","D","E"];
    keys=["C","D","E"];
  }
  if(level==2){
    card=["C","D","E","F","G"];
    keys=["C","D","E","F","G","A","B"];
  }
  if(level==3){
    card=["C","D","E","F","G","A","B"];
    keys=["C","D","E","F","G","A","B"];
  }

  const shuffled=[...card].sort(()=>Math.random()-0.5);

  const notesDiv=document.getElementById("notes");
  const keyboard=document.getElementById("keyboard");

  notesDiv.innerHTML="";
  keyboard.innerHTML="";

  selected=null;
  clearInterval(timerInterval);
  document.getElementById("timer").innerText="⏱ 0.00초";

  /* 🎴 카드 */
  shuffled.forEach(n=>{
    const btn=document.createElement("div");
    btn.className="note";
    btn.innerText=n;

    btn.onclick=()=>{
      if(!startTime) startTimer();

      // ⭐ 선택 표시
      document.querySelectorAll(".note").forEach(el=>el.classList.remove("selected"));
      btn.classList.add("selected");

      selected=btn;

      playSound(`sounds/${n.toLowerCase()}.m4a`);
    };

    notesDiv.appendChild(btn);
  });

  /* 🎹 건반 */
  keys.forEach((n,i)=>{
    const key=document.createElement("div");
    key.className="white-key";

    key.onclick=()=>{
      if(!selected) return;

      if(selected.innerText===n){
        key.style.background="lightgreen";

        playSound("sounds/right.m4a");

        selected.remove();
        selected=null;

        checkComplete();
      }
    };

    keyboard.appendChild(key);
  });

  /* 검은건반 */
  const black=["C","D","F","G","A"];

  keys.forEach((n,i)=>{
    if(black.includes(n)){
      const b=document.createElement("div");
      b.className="black-key";
      b.style.left=(i*60+40)+"px";
      keyboard.appendChild(b);
    }
  });
}

/* 🎉 완료 */
function checkComplete(){
  if(document.querySelectorAll(".note").length===0){
    clearInterval(timerInterval);

    const t=Date.now()-startTime;
    const sec=(t/1000);

    playSound("sounds/success.mp3");

    saveRecord(sec);

    setTimeout(showResult,300);
  }
}

/* 💾 저장 */
function saveRecord(time){
  const date=new Date().toLocaleDateString();

  // ⭐ 시작 시각
  const timeStr=startClock.toLocaleTimeString();

  let data=JSON.parse(localStorage.getItem(name))||[];

  data.push({
    date:date,
    clock:timeStr,
    time:time
  });

  localStorage.setItem(name,JSON.stringify(data));
}

/* 📊 결과 */
function showResult(){
  document.getElementById("gamePage").classList.remove("active");
  document.getElementById("resultPage").classList.add("active");

  const data=JSON.parse(localStorage.getItem(name))||[];
  const div=document.getElementById("records");
  div.innerHTML="";

  const best=Math.min(...data.map(d=>d.time));

  data.forEach(d=>{
    const el=document.createElement("div");

    el.innerText =
      `${d.date} ${d.clock} - ${d.time.toFixed(2)}초`;

    if(d.time===best){
      el.classList.add("best");
    }

    div.appendChild(el);
  });
}
</script>

</body>
</html>
