<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>피아노 게임</title>

<style>
body {
  font-family: sans-serif;
  background: #201c66;
  color: #f5f5f5;

  display: flex;
  justify-content: center;
  align-items: flex-start;

  height: 100vh;
  margin: 0;
}

.container {
  margin-top: 120px;
  text-align: center;
}

.page { display:none; }
.active { display:block; }

h2 {
  color: #ffffff;
}

/* 버튼 */
button {
  font-size: 1.5em;
  padding: 15px 25px;
  margin: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  background: white;
  color: #120a8f;
}

/* 입력 */
#username {
  font-size: 1.5em;
  padding: 15px;
  width: 350px;
}

/* 🎴 카드 */
.note {
  display:inline-block;
  margin:8px;
  padding:15px 20px;
  background:#eee;
  color:black;
  border-radius:8px;
  cursor:pointer;
  font-size:1.5em;

  transition: transform 0.1s ease, box-shadow 0.1s ease;
  box-shadow: 0 4px 0 #bbb;
}

/* 누르는 순간 */
.note:active {
  transform: translateY(4px);
  box-shadow: 0 1px 0 #999;
}

/* 선택 상태 */
.note.selected {
  background:#ffd966;
}

/* ⭐ 클릭 애니메이션 */
.note.pressed {
  transform: scale(0.95);
}

/* 🎹 건반 */
.keyboard {
  position:relative;
  width:fit-content;
  margin:40px auto;
  height:220px;
}

.white-key {
  width:70px;
  height:220px;
  border:1px solid black;
  background:white;
  float:left;
}

.black-key {
  position:absolute;
  width:45px;
  height:130px;
  background:black;
  top:0;
}

/* 타이머 */
#timer {
  font-size:1.8em;
  margin:20px;
  color:#ffffff;
}

/* 기록 */
.current {
  font-weight:bold;
}
</style>
</head>

<body>
<div class="container">

<!-- 이름 -->
<div id="startPage" class="page active">
  <h2>이름 입력</h2>
  <input id="username" placeholder="이름 입력">
  <br><br>
  <button onclick="goLevel()">시작</button>
</div>

<!-- 단계 -->
<div id="levelPage" class="page">
  <h2>단계 선택</h2>
  <button onclick="startGame(1)">1단계</button>
  <button onclick="startGame(2)">2단계</button>
  <button onclick="startGame(3)">3단계</button>
</div>

<!-- 게임 -->
<div id="gamePage" class="page">
  <h2 id="playerName"></h2>
  <div id="timer">⏱ 0.00초</div>

  <div id="notes"></div>
  <div id="keyboard" class="keyboard"></div>
</div>

<!-- 결과 -->
<div id="resultPage" class="page">
  <h2 id="resultTitle"></h2>
  <div id="records"></div>
  <button onclick="location.reload()">다시하기</button>
</div>

</div>

<script>
let name="";
let level=1;
let selected=null;
let startTime=null;
let timerInterval=null;
let currentTime=0;

/* 사운드 */
function playSound(file){
  new Audio(file).play().catch(()=>{});
}

/* 페이지 이동 */
function goLevel(){
  name=document.getElementById("username").value;
  if(!name) return alert("이름 입력");

  document.getElementById("startPage").classList.remove("active");
  document.getElementById("levelPage").classList.add("active");
}

/* 타이머 */
function startTimer(){
  startTime=Date.now();

  timerInterval=setInterval(()=>{
    const t=Date.now()-startTime;
    const s=Math.floor(t/1000);
    const cs=Math.floor((t%1000)/10);

    document.getElementById("timer").innerText =
      `⏱ ${s}.${cs.toString().padStart(2,'0')}초`;
  },50);
}

/* 게임 시작 */
function startGame(lv){
  level = lv;

  document.getElementById("levelPage").classList.remove("active");
  document.getElementById("gamePage").classList.add("active");

  document.getElementById("playerName").innerText = `${name} - ${level}단계`;

  let card, keys;

  if(level==1){
    card=["C","D","E"];
    keys=["C","D","E"];
  }
  if(level==2){
    card=["C","D","E","F","G"];
    keys=["C","D","E","F","G","A","B"];
  }
  if(level==3){
    card=["C","D","E","F","G","A","B"];
    keys=["C","D","E","F","G","A","B"];
  }

  const shuffled=[...card].sort(()=>Math.random()-0.5);

  const notesDiv=document.getElementById("notes");
  const keyboard=document.getElementById("keyboard");

  notesDiv.innerHTML="";
  keyboard.innerHTML="";

  selected=null;
  clearInterval(timerInterval);
  document.getElementById("timer").innerText="⏱ 0.00초";

  /* 카드 */
  shuffled.forEach(n=>{
    const el=document.createElement("div");
    el.className="note";
    el.innerText=n;

    el.onclick=()=>{
      if(!startTime) startTimer();

      /* ⭐ 눌림 애니메이션 */
      el.classList.add("pressed");
      setTimeout(()=>{
        el.classList.remove("pressed");
      },100);

      document.querySelectorAll(".note").forEach(e=>e.classList.remove("selected"));
      el.classList.add("selected");

      selected=el;

      playSound(`sounds/${n.toLowerCase()}.m4a`);
    };

    notesDiv.appendChild(el);
  });

  /* 건반 */
  keys.forEach((n,i)=>{
    const key=document.createElement("div");
    key.className="white-key";

    key.onclick=()=>{
      if(!selected) return;

      if(selected.innerText===n){
        key.style.background="lightgreen";

        playSound("sounds/right.m4a");

        selected.remove();
        selected=null;

        checkComplete();
      }
    };

    keyboard.appendChild(key);
  });

  /* 검은건반 */
  const black=["C","D","F","G","A"];

  keys.forEach((n,i)=>{
    if(black.includes(n)){
      const b=document.createElement("div");
      b.className="black-key";
      b.style.left=(i*70+45)+"px";
      keyboard.appendChild(b);
    }
  });
}

/* 완료 */
function checkComplete(){
  if(document.querySelectorAll(".note").length===0){
    clearInterval(timerInterval);

    const t=Date.now()-startTime;
    currentTime=t/1000;

    playSound("sounds/success.mp3");

    saveRecord();

    setTimeout(showResult,300);
  }
}

/* 저장 */
function saveRecord(){
  const key = name + "_level" + level;

  let data=JSON.parse(localStorage.getItem(key))||[];

  const now = new Date();

  data.push({
    time: currentTime,
    date: now.toLocaleDateString(),
    clock: now.toLocaleTimeString()
  });

  localStorage.setItem(key, JSON.stringify(data));
}

/* 결과 */
function showResult(){

  document.getElementById("gamePage").classList.remove("active");
  document.getElementById("resultPage").classList.add("active");

  document.getElementById("resultTitle").innerText =
    `${name} - ${level}단계 기록`;

  const key = name + "_level" + level;
  let data=JSON.parse(localStorage.getItem(key))||[];

  data = data.filter(d => d && typeof d.time === "number");

  const div=document.getElementById("records");
  div.innerHTML="";

  const best = data.length > 0
    ? Math.min(...data.map(d => d.time))
    : null;

  data.forEach(d=>{
    const el=document.createElement("div");

    let text = `${d.date} ${d.clock} - ${d.time.toFixed(2)}초`;

    if(best !== null && d.time === best){
      text += " 🥇";
    }

    el.innerText = text;

    if(d.time === currentTime){
      el.classList.add("current");
    }

    div.appendChild(el);
  });
}
</script>

</body>
</html>
