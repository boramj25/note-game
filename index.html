<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>피아노 게임</title>

<style>
body { text-align:center; font-family:sans-serif; }

.page { display:none; }
.active { display:block; }

.best { color:red; font-weight:bold; }

.white-key {
  width:60px; height:200px;
  border:1px solid black;
  float:left;
}

.black-key {
  position:absolute;
  width:40px; height:120px;
  background:black;
  top:0;
}
.keyboard {
  position:relative;
  width:fit-content;
  margin:20px auto;
  height:200px;
}
</style>
</head>

<body>

<!-- 🎯 이름 입력 -->
<div id="startPage" class="page active">
  <h2>이름 입력</h2>
  <input id="username" placeholder="이름 입력">
  <br><br>
  <button onclick="goLevel()">시작</button>
</div>

<!-- 🎯 단계 선택 -->
<div id="levelPage" class="page">
  <h2>단계 선택</h2>
  <button onclick="startGame(1)">1단계</button>
  <button onclick="startGame(2)">2단계</button>
  <button onclick="startGame(3)">3단계</button>
</div>

<!-- 🎮 게임 -->
<div id="gamePage" class="page">
  <h2 id="playerName"></h2>
  <div id="timer">0.00</div>
  <div id="notes"></div>
  <div id="keyboard" class="keyboard"></div>
</div>

<!-- 🎉 결과 -->
<div id="resultPage" class="page">
  <h2>결과</h2>
  <div id="records"></div>
  <button onclick="location.reload()">다시하기</button>
</div>

<script>
let name = "";
let startTime;

/* 이름 → 단계 */
function goLevel(){
  name = document.getElementById("username").value;
  if(!name) return alert("이름 입력");

  document.getElementById("startPage").classList.remove("active");
  document.getElementById("levelPage").classList.add("active");
}

/* 게임 시작 */
function startGame(level){

  document.getElementById("levelPage").classList.remove("active");
  document.getElementById("gamePage").classList.add("active");

  document.getElementById("playerName").innerText = name;

  let card, keys;

  if(level==1){
    card=["C","D","E"];
    keys=["C","D","E"];
  }
  if(level==2){
    card=["C","D","E","F","G"];
    keys=["C","D","E","F","G","A","B"];
  }
  if(level==3){
    card=["C","D","E","F","G","A","B"];
    keys=["C","D","E","F","G","A","B"];
  }

  const shuffled=[...card].sort(()=>Math.random()-0.5);

  const notesDiv=document.getElementById("notes");
  const keyboard=document.getElementById("keyboard");

  notesDiv.innerHTML="";
  keyboard.innerHTML="";

  startTime=Date.now();

  /* 카드 */
  let selected=null;

  shuffled.forEach(n=>{
    const el=document.createElement("button");
    el.innerText=n;

    el.onclick=()=>{
      selected=n;
    };

    notesDiv.appendChild(el);
  });

  /* 건반 */
  keys.forEach((n,i)=>{
    const key=document.createElement("div");
    key.className="white-key";

    key.onclick=()=>{
      if(selected===n){
        key.style.background="lightgreen";
        selected=null;

        if(document.querySelectorAll("button").length===0){
          finish();
        }
      }
    };

    keyboard.appendChild(key);
  });

  /* 검은건반 */
  const black=["C","D","F","G","A"];

  keys.forEach((n,i)=>{
    if(black.includes(n)){
      const b=document.createElement("div");
      b.className="black-key";
      b.style.left=(i*60+40)+"px";
      keyboard.appendChild(b);
    }
  });
}

/* 🎉 종료 */
function finish(){
  const time=(Date.now()-startTime)/1000;

  const today=new Date().toLocaleDateString();

  let data=JSON.parse(localStorage.getItem(name))||[];

  data.push({date:today,time:time});

  localStorage.setItem(name,JSON.stringify(data));

  showResult(data);

  document.getElementById("gamePage").classList.remove("active");
  document.getElementById("resultPage").classList.add("active");
}

/* 📊 결과 */
function showResult(data){
  const div=document.getElementById("records");
  div.innerHTML="";

  const best=Math.min(...data.map(d=>d.time));

  data.forEach(d=>{
    const p=document.createElement("div");

    p.innerText=`${d.date} - ${d.time.toFixed(2)}초`;

    if(d.time===best){
      p.classList.add("best");
    }

    div.appendChild(p);
  });
}
</script>

</body>
</html>
