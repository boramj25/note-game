<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>피아노 게임</title>

<style>
body { text-align:center; font-family:sans-serif; }

.page { display:none; }
.active { display:block; }

.best { color:red; font-weight:bold; }

/* 🎴 카드 */
.note {
  display:inline-block;
  margin:5px;
  padding:10px 15px;
  background:#eee;
  border:1px solid #ccc;
  cursor:pointer;
  position: relative;
}

.note.selected {
  background:#ffd966;
}

/* 드래그 중 */
.note.dragging {
  opacity:0.7;
  position:absolute;
  z-index:1000;
}

/* 🎹 건반 */
.keyboard {
  position:relative;
  width:fit-content;
  margin:20px auto;
  height:200px;
}

.white-key {
  width:60px; height:200px;
  border:1px solid black;
  float:left;
}

.black-key {
  position:absolute;
  width:40px; height:120px;
  background:black;
  top:0;
}
</style>
</head>

<body>

<div id="startPage" class="page active">
  <h2>이름 입력</h2>
  <input id="username">
  <br><br>
  <button onclick="goLevel()">시작</button>
</div>

<div id="levelPage" class="page">
  <h2>단계 선택</h2>
  <button onclick="startGame(1)">1단계</button>
  <button onclick="startGame(2)">2단계</button>
  <button onclick="startGame(3)">3단계</button>
</div>

<div id="gamePage" class="page">
  <h2 id="playerName"></h2>
  <div id="timer">⏱ 0.00초</div>

  <div id="notes"></div>
  <div id="keyboard" class="keyboard"></div>
</div>

<script>
let name="";
let selected=null;
let startTime=null;
let timerInterval=null;

/* 🔊 사운드 */
function playSound(file){
  const audio=new Audio(file);
  audio.currentTime=0;
  audio.play().catch(()=>{});
}

/* 페이지 */
function goLevel(){
  name=document.getElementById("username").value;
  if(!name) return alert("이름 입력");

  document.getElementById("startPage").classList.remove("active");
  document.getElementById("levelPage").classList.add("active");
}

/* 타이머 */
function startTimer(){
  startTime=Date.now();

  timerInterval=setInterval(()=>{
    const t=Date.now()-startTime;
    const s=Math.floor(t/1000);
    const cs=Math.floor((t%1000)/10);

    document.getElementById("timer").innerText =
      `⏱ ${s}.${cs.toString().padStart(2,'0')}초`;
  },50);
}

/* 🎯 게임 시작 */
function startGame(level){

  document.getElementById("levelPage").classList.remove("active");
  document.getElementById("gamePage").classList.add("active");

  let card, keys;

  if(level==1){
    card=["C","D","E"];
    keys=["C","D","E"];
  }
  if(level==2){
    card=["C","D","E","F","G"];
    keys=["C","D","E","F","G","A","B"];
  }
  if(level==3){
    card=["C","D","E","F","G","A","B"];
    keys=["C","D","E","F","G","A","B"];
  }

  const shuffled=[...card].sort(()=>Math.random()-0.5);

  const notesDiv=document.getElementById("notes");
  const keyboard=document.getElementById("keyboard");

  notesDiv.innerHTML="";
  keyboard.innerHTML="";

  selected=null;
  clearInterval(timerInterval);
  document.getElementById("timer").innerText="⏱ 0.00초";

  /* 🎴 카드 */
  shuffled.forEach(n=>{
    const el=document.createElement("div");
    el.className="note";
    el.innerText=n;

    let offsetX, offsetY, moved=false;

    /* 클릭 */
    el.onclick=()=>{
      if(moved) return; // 드래그 후 클릭 방지

      if(!startTime) startTimer();

      document.querySelectorAll(".note").forEach(e=>e.classList.remove("selected"));
      el.classList.add("selected");

      selected=el;

      playSound(`sounds/${n.toLowerCase()}.m4a`);
    };

    /* 드래그 시작 */
    el.addEventListener("touchstart", e=>{
      const t=e.touches[0];

      moved=false;

      offsetX=t.clientX - el.getBoundingClientRect().left;
      offsetY=t.clientY - el.getBoundingClientRect().top;

      el.classList.add("dragging");
    });

    /* 드래그 이동 */
    el.addEventListener("touchmove", e=>{
      const t=e.touches[0];
      moved=true;

      el.style.left=(t.clientX-offsetX)+"px";
      el.style.top=(t.clientY-offsetY)+"px";
    });

    /* 드롭 */
    el.addEventListener("touchend", e=>{
      el.classList.remove("dragging");

      const t=e.changedTouches[0];

      checkDrop(el, t.clientX, t.clientY);

      setTimeout(()=>moved=false,50);
    });

    notesDiv.appendChild(el);
  });

  /* 🎹 건반 */
  keys.forEach((n,i)=>{
    const key=document.createElement("div");
    key.className="white-key";
    key.dataset.note=n;

    key.onclick=()=>{
      if(!selected) return;

      if(selected.innerText===n){
        key.style.background="lightgreen";

        playSound("sounds/right.m4a");

        selected.remove();
        selected=null;

        checkComplete();
      }
    };

    keyboard.appendChild(key);
  });

  /* 검은건반 */
  const black=["C","D","F","G","A"];

  keys.forEach((n,i)=>{
    if(black.includes(n)){
      const b=document.createElement("div");
      b.className="black-key";
      b.style.left=(i*60+40)+"px";
      keyboard.appendChild(b);
    }
  });
}

/* 드롭 판정 */
function checkDrop(card, x, y){
  const keys=document.querySelectorAll(".white-key");

  keys.forEach(key=>{
    const r=key.getBoundingClientRect();

    if(x>r.left && x<r.right && y>r.top && y<r.bottom){
      if(card.innerText===key.dataset.note){
        key.style.background="lightgreen";

        playSound("sounds/right.m4a");

        card.remove();

        checkComplete();
      }
    }
  });

  card.style.left="";
  card.style.top="";
}

/* 완료 */
function checkComplete(){
  if(document.querySelectorAll(".note").length===0){
    clearInterval(timerInterval);

    playSound("sounds/success.mp3");

    setTimeout(()=>{
      alert("🎉 성공!");
    },300);
  }
}
</script>

</body>
</html>
